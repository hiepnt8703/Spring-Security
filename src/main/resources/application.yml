server:
  port: 8088

spring:
  application:
    name: shop-app

  datasource:
    url: jdbc:mysql://localhost:3306/intern-rbac?createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret:
    key: mySecretKeyForJwtTokenGeneration12345678901234567890

